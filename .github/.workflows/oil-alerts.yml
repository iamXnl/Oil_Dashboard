name: Oil Geopolitics Discord Alerts

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run oil alert monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python alerts.py

      - name: Commit alert state
        run: |
          git config user.name "retailtraders-alert-bot"
          git config user.email "actions@github.com"
          git add discord_alert_state.json || true
          git diff --cached --quiet || git commit -m "Update Discord alert state"
          git push || true